{% extends "base.html" %}

{% load static %}

{% block gallery %}

<title>{% block title %} Gallery{% endblock %}</title>

<img loading="lazy" src="{% static 'images/banner/banner1.jpg' %}" class="img-fluid" alt="banner1" width="100%">

<section id="main-container" class="main-container">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="shuffle-btn-group">
          <label class="active" for="all">
            <input type="radio" name="shuffle-filter" id="all" value="all" checked="checked">Show All
          </label>
          <label for="commercial">
            <input type="radio" name="shuffle-filter" id="commercial" value="commercial">INCOME
          </label>
          <label for="education">
            <input type="radio" name="shuffle-filter" id="education" value="education">BAWEMAS
          </label>
          <label for="government">
            <input type="radio" name="shuffle-filter" id="government" value="government">SUSCRIB
          </label>
          <label for="infrastructure">
            <input type="radio" name="shuffle-filter" id="infrastructure" value="infrastructure">SOCIAL INITIATIVES
          </label>
          <label for="residential">
            <input type="radio" name="shuffle-filter" id="residential" value="residential">SHINE
          </label>
        </div><!-- project filter end -->


        <div class="row shuffle-wrapper">
          <div class="col-1 shuffle-sizer"></div>

          <div class="col-lg-4 col-md-6 shuffle-item" data-groups="[&quot;&quot;,&quot;healthcare&quot;]">
            <div class="project-img-container">
              <a class="gallery-popup" href="images/gallery/isolve.jpg">
                <img class="img-fluid" src="{% static 'images/gallery/isolve.jpg' %}" alt="all">
                <span class="gallery-icon"><i class="fa fa-plus"></i></span>
              </a>
              <div class="project-item-info">
                <div class="project-item-info-content">
                  <h3 class="project-item-title">
                    <a href="{% url 'project_isolve' %}">i-SOLVE</a>
                  </h3>
                  <p class="project-cat"> </p>
                </div>
              </div>
            </div>
          </div><!-- shuffle item 1 end -->

          <div class="col-lg-4 col-md-6 shuffle-item" data-groups="[&quot;commercial&quot;]">
            <div class="project-img-container">
              <a class="gallery-popup" href="images/gallery/income.jpg">
                <img class="img-fluid" src="{% static 'images/gallery/income.jpg' %}" alt="income">
                <span class="gallery-icon"><i class="fa fa-plus"></i></span>
              </a>
              <div class="project-item-info">
                <div class="project-item-info-content">
                  <h3 class="project-item-title">
                  <a href="{% url 'project_income' %}">INCOME</a>
                  </h3>
                  <p class="project-cat"></p>
                </div>
              </div>
            </div>
          </div><!-- shuffle item 2 end -->

          <div class="col-lg-4 col-md-6 shuffle-item" data-groups="[&quot;education&quot;]">
            <div class="project-img-container">
              <a class="gallery-popup" href="images/projects/bawemas.jpg">
                <img class="img-fluid" src="{% static 'images/gallery/bawemas.jpg' %}" alt="bawemas">
                <span class="gallery-icon"><i class="fa fa-plus"></i></span>
              </a>
              <div class="project-item-info">
                <div class="project-item-info-content">
                  <h3 class="project-item-title">
                    <a href="{% url 'project_bawemas' %}">BAWEMAS</a>
                  </h3>
                  <p class="project-cat"></p>
                </div>
              </div>
            </div>
          </div><!-- shuffle item 3 end -->

          <div class="col-lg-4 col-md-6 shuffle-item" data-groups="[&quot;government&quot;]">
            <div class="project-img-container">
              <a class="gallery-popup" href="images/projects/suscrib.jpg">
                <img class="img-fluid" src="{% static 'images/gallery/suscrib.jpg' %}" alt="suscrib">
                <span class="gallery-icon"><i class="fa fa-plus"></i></span>
              </a>
              <div class="project-item-info">
                <div class="project-item-info-content">
                  <h3 class="project-item-title">
                    <a href="{% url 'project_suscrib' %}">SUSCRIB</a>
                  </h3>
                  <p class="project-cat"></p>
                </div>
              </div>
            </div>
          </div><!-- shuffle item 4 end -->

          <div class="col-lg-4 col-md-6 shuffle-item" data-groups="[&quot;infrastructure&quot;]">
            <div class="project-img-container">
              <a class="gallery-popup" href="images/projects/socialinitiatives.jpg">
                <img class="img-fluid" src="{% static 'images/gallery/socialinitiatives.jpg' %}" alt="socialinitiatives">
                <span class="gallery-icon"><i class="fa fa-plus"></i></span>
              </a>
              <div class="project-item-info">
                <div class="project-item-info-content">
                  <h3 class="project-item-title">
                    <a href="{% url 'project_sei' %}">SOCIAL ENTERPRISE INITIATIVES</a>
                  </h3>
                  <p class="project-cat"></p>
                </div>
              </div>
            </div>
          </div><!-- shuffle item 5 end -->

          <div class="col-lg-4 col-md-6 shuffle-item" data-groups="[&quot;residential&quot;]">
            <div class="project-img-container">
              <a class="gallery-popup" href="images/projects/shine.jpg">
                <img class="img-fluid" src="{% static 'images/gallery/shine.jpg' %}" alt="shine">
                <span class="gallery-icon"><i class="fa fa-plus"></i></span>
              </a>
              <div class="project-item-info">
                <div class="project-item-info-content">
                  <h3 class="project-item-title">
                    <a href="{% url 'project_shine' %}">SHINE</a>
                  </h3>
                  <p class="project-cat"></p>
                </div>
              </div>
            </div>
          </div><!-- shuffle item 6 end -->
        </div><!-- shuffle end -->
      </div>

    </div><!-- Content row end -->

  </div><!-- Conatiner end -->
</section><!-- Main container end -->

{% endblock %}
